<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Clinical Trial Explorer{% endblock %}</title>
    <link rel="icon" href="{{ url_for('static', path='img/Agent.png') }}" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <link rel="stylesheet" href="{{ url_for('static', path='css/app.css') }}" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js" defer></script>
    <script src="{{ url_for('static', path='js/render.js') }}" defer></script>
    <script src="{{ url_for('static', path='js/chat.js') }}" defer></script>
    {% block head %}{% endblock %}
  </head>
  <body class="app-body">
    <header class="site-header">
      <div class="header-inner workspace-header">
        <a class="brand" href="/">
          <img
            class="brand-logo"
            src="{{ url_for('static', path='img/Agent.png') }}"
            alt=""
            width="32"
            height="32"
          />
          <span>Clinical Trial Explorer</span>
        </a>
        <span class="badge">ClinicalTrials.gov</span>
      </div>
    </header>
    <main class="app-main">
      {% block content %}{% endblock %}
    </main>
    <footer class="site-footer">
      <div class="footer-inner workspace-header">
        <p class="footer-text">
          Trial data from
          <a href="https://clinicaltrials.gov/" target="_blank" rel="noopener">ClinicalTrials.gov</a>.
          Results reflect sampled API responses.
        </p>
        <nav class="footer-links" aria-label="Footer">
          <a href="/docs">API docs</a>
        </nav>
      </div>
    </footer>
    {% block scripts %}{% endblock %}
  </body>
</html>
